<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora de Plantões</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            background: #4a148c;
            padding: 10px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .header {
            background: #4a148c;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 15px;
        }
        
        .controles {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .controles h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .controles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .input-field {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        
        .input-field label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .input-field select, .input-field input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .funcionarios-lista {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .funcionarios-lista h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .funcionarios-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .funcionario-tag {
            background: #e0e0e0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .funcionario-tag.selecionado {
            background: #4a148c;
            color: white;
        }
        
        .btn-remover-funcionario {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .adicionar-funcionario {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .adicionar-funcionario input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            min-width: 150px;
        }
        
        .btn-adicionar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .acoes-rapidas {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            flex: 1;
            min-width: 100px;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            flex: 1;
            min-width: 100px;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            flex: 1;
            min-width: 100px;
        }
        
        .btn-pdf {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-pdf:hover {
            background: #c82333;
        }
        
        .calendario {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .mes-ano {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .mes-ano h3 {
            font-size: 20px;
            color: #333;
        }
        
        .info-valores {
            display: flex;
            gap: 10px;
        }
        
        .info-valor-item {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .info-valor-item .label {
            font-size: 11px;
            color: #666;
        }
        
        .info-valor-item .valor {
            font-size: 14px;
            font-weight: bold;
            color: #28a745;
        }
        
        .calendario-wrapper {
            min-width: 600px;
        }
        
        .dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 3px;
        }
        
        .dia-semana {
            text-align: center;
            font-weight: bold;
            color: #333;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .dias-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        
        .dia-card {
            background: #f5f5f5;
            border-radius: 5px;
            padding: 8px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
        }
        
        .dia-card.sabado {
            background: #e3f2fd;
        }
        
        .dia-card.domingo {
            background: #ffebee;
        }
        
        .dia-card.vazio {
            background: transparent;
            border: 1px dashed #ddd;
            min-height: 100px;
        }
        
        .dia-numero {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #ddd;
        }
        
        .plantao-item {
            margin-bottom: 3px;
            padding: 4px;
            background: white;
            border-radius: 3px;
            font-size: 9px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        
        .plantao-item.noturno {
            border-left-color: #4a148c;
        }
        
        .plantao-item.sabado-extra {
            border-left-color: #ff9800;
        }
        
        .plantao-item.domingo-diurno {
            border-left-color: #4caf50;
        }
        
        .plantao-item.selecionado {
            background: #e8e4f0;
        }
        
        .plantao-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .plantao-horario {
            font-size: 8px;
            font-weight: bold;
        }
        
        .plantao-funcionario {
            font-size: 8px;
            background: #f0f0f0;
            padding: 2px 4px;
            border-radius: 10px;
            max-width: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .resultado-final {
            background: #4a148c;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            color: white;
        }
        
        .resultado-final h3 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .resultado-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-radius: 8px;
        }
        
        .resultado-tabela {
            min-width: 500px;
            width: 100%;
            border-collapse: collapse;
        }
        
        .resultado-tabela th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            color: #333;
            font-size: 13px;
            border-bottom: 2px solid #ddd;
        }
        
        .resultado-tabela td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #333;
            font-size: 13px;
        }
        
        .resultado-tabela .total-row {
            background: #f0f0f0;
            font-weight: bold;
        }
        
        .valor-destaque {
            color: #28a745;
            font-weight: bold;
        }
        
        .sem-dados {
            background: white;
            padding: 30px;
            text-align: center;
            color: #666;
            border-radius: 8px;
        }
        
        .legenda {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .legenda-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .legenda-cor {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
        
        .legenda-cor.noturno {
            background: #4a148c;
        }
        
        .legenda-cor.sabado-extra {
            background: #ff9800;
        }
        
        .legenda-cor.domingo-diurno {
            background: #4caf50;
        }
        
        .aviso {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 12px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Calculadora de Plantões</h1>
            <p>Salário: R$ 4.500,00</p>
        </div>
        
        <div class="main-content">
            <div class="controles">
                <h2>📅 Mês</h2>
                <div class="controles-grid">
                    <div class="input-field">
                        <label>Mês:</label>
                        <select id="mesSelect" onchange="gerarCalendario()">
                            <option value="0">Janeiro</option>
                            <option value="1">Fevereiro</option>
                            <option value="2">Março</option>
                            <option value="3">Abril</option>
                            <option value="4">Maio</option>
                            <option value="5">Junho</option>
                            <option value="6">Julho</option>
                            <option value="7">Agosto</option>
                            <option value="8">Setembro</option>
                            <option value="9">Outubro</option>
                            <option value="10">Novembro</option>
                            <option value="11">Dezembro</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label>Ano:</label>
                        <input type="number" id="anoInput" value="2024" min="2020" max="2030" onchange="gerarCalendario()">
                    </div>
                </div>
                
                <div class="funcionarios-lista">
                    <h3>👥 Guardas</h3>
                    <div class="funcionarios-tags" id="funcionariosTags">
                        <span class="funcionario-tag selecionado" onclick="selecionarFuncionario('Júnior')">Júnior</span>
                        <span class="funcionario-tag" onclick="selecionarFuncionario('Dudu')">Dudu</span>
                        <span class="funcionario-tag" onclick="selecionarFuncionario('Antônio')">Antônio</span>
                    </div>
                    
                    <div class="adicionar-funcionario">
                        <input type="text" id="novoGuardinha" placeholder="Novo guarda">
                        <button class="btn-adicionar" onclick="adicionarGuardinha()">Adicionar</button>
                    </div>
                    
                    <div class="acoes-rapidas">
                        <button class="btn-primary" onclick="marcarTodosPlantoes()">Marcar todos</button>
                        <button class="btn-warning" onclick="desmarcarTodosPlantoes()">Desmarcar</button>
                        <button class="btn-danger" onclick="limparTodosPlantoes()">Limpar</button>
                    </div>
                </div>
            </div>
            
            <div class="calendario">
                <div class="mes-ano" id="mesAnoDisplay"></div>
                <div class="calendario-wrapper" id="calendarioContainer"></div>
            </div>
            
            <div class="resultado-final">
                <h3>💰 Resultado</h3>
                <div class="resultado-wrapper" id="resultadoContainer"></div>
                
                <button class="btn-pdf" onclick="gerarPDF()">
                    📄 GERAR RELATÓRIO PDF
                </button>
            </div>
            
            <div class="legenda">
                <div class="legenda-item">
                    <div class="legenda-cor noturno"></div>
                    <span>Noturno (17h-06:30)</span>
                </div>
                <div class="legenda-item">
                    <div class="legenda-cor sabado-extra"></div>
                    <span>Sábado (12h-17h)</span>
                </div>
                <div class="legenda-item">
                    <div class="legenda-cor domingo-diurno"></div>
                    <span>Domingo (06:30-17h)</span>
                </div>
            </div>
            
            <div class="aviso">
                <strong>Como usar:</strong> Selecione um guarda e clique nos plantões
            </div>
        </div>
    </div>
    
    <script>
        const SALARIO_MENSAL = 4500;
        let funcionarioSelecionado = 'Júnior';
        let plantoes = {};
        let guardasExtras = [];
        
        const nomesMeses = [
            'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
        ];
        
        function adicionarGuardinha() {
            const nome = document.getElementById('novoGuardinha').value.trim();
            if (nome === '') {
                alert('Digite um nome');
                return;
            }
            
            if (guardasExtras.includes(nome) || ['Júnior', 'Dudu', 'Antônio'].includes(nome)) {
                alert('Guarda já existe');
                return;
            }
            
            guardasExtras.push(nome);
            
            const tagsContainer = document.getElementById('funcionariosTags');
            const novaTag = document.createElement('span');
            novaTag.className = 'funcionario-tag';
            novaTag.setAttribute('onclick', `selecionarFuncionario('${nome}')`);
            novaTag.innerHTML = `
                ${nome}
                <span class="btn-remover-funcionario" onclick="removerGuardinha('${nome}', event)">✕</span>
            `;
            
            tagsContainer.appendChild(novaTag);
            document.getElementById('novoGuardinha').value = '';
            selecionarFuncionario(nome);
        }
        
        function removerGuardinha(nome, event) {
            event.stopPropagation();
            
            if (confirm(`Remover ${nome}?`)) {
                guardasExtras = guardasExtras.filter(g => g !== nome);
                
                document.querySelectorAll('.funcionario-tag').forEach(tag => {
                    if (tag.textContent.includes(nome)) {
                        tag.remove();
                    }
                });
                
                if (funcionarioSelecionado === nome) {
                    selecionarFuncionario('Júnior');
                }
                
                Object.keys(plantoes).forEach(key => {
                    if (plantoes[key] === nome) {
                        delete plantoes[key];
                    }
                });
                
                gerarCalendario();
            }
        }
        
        function selecionarFuncionario(nome) {
            funcionarioSelecionado = nome;
            
            document.querySelectorAll('.funcionario-tag').forEach(tag => {
                const textoTag = tag.textContent.replace('✕', '').trim();
                if (textoTag === nome) {
                    tag.classList.add('selecionado');
                } else {
                    tag.classList.remove('selecionado');
                }
            });
        }
        
        function marcarPlantao(dia, tipo) {
            const key = `${dia}-${tipo}`;
            
            if (plantoes[key] === funcionarioSelecionado) {
                delete plantoes[key];
            } else {
                plantoes[key] = funcionarioSelecionado;
            }
            
            gerarCalendario();
        }
        
        function marcarTodosPlantoes() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoInput').value);
            const dias = gerarDiasArray(mes, ano);
            
            dias.forEach(dia => {
                if (dia) {
                    plantoes[`${dia.numero}-noturno`] = funcionarioSelecionado;
                    
                    if (dia.diaSemana === 6) {
                        plantoes[`${dia.numero}-sabado-extra`] = funcionarioSelecionado;
                    }
                    
                    if (dia.diaSemana === 0) {
                        plantoes[`${dia.numero}-domingo-diurno`] = funcionarioSelecionado;
                    }
                }
            });
            
            gerarCalendario();
        }
        
        function desmarcarTodosPlantoes() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoInput').value);
            const dias = gerarDiasArray(mes, ano);
            
            dias.forEach(dia => {
                if (dia) {
                    const noturnoKey = `${dia.numero}-noturno`;
                    if (plantoes[noturnoKey] === funcionarioSelecionado) {
                        delete plantoes[noturnoKey];
                    }
                    
                    if (dia.diaSemana === 6) {
                        const extraKey = `${dia.numero}-sabado-extra`;
                        if (plantoes[extraKey] === funcionarioSelecionado) {
                            delete plantoes[extraKey];
                        }
                    }
                    
                    if (dia.diaSemana === 0) {
                        const diurnoKey = `${dia.numero}-domingo-diurno`;
                        if (plantoes[diurnoKey] === funcionarioSelecionado) {
                            delete plantoes[diurnoKey];
                        }
                    }
                }
            });
            
            gerarCalendario();
        }
        
        function limparTodosPlantoes() {
            if (confirm('Limpar todos os plantões?')) {
                plantoes = {};
                gerarCalendario();
            }
        }
        
        function gerarDiasArray(mes, ano) {
            const primeiroDia = new Date(ano, mes, 1);
            const ultimoDia = new Date(ano, mes + 1, 0);
            const dias = [];
            
            for (let i = 0; i < primeiroDia.getDay(); i++) {
                dias.push(null);
            }
            
            for (let dia = 1; dia <= ultimoDia.getDate(); dia++) {
                const data = new Date(ano, mes, dia);
                dias.push({
                    numero: dia,
                    diaSemana: data.getDay()
                });
            }
            
            return dias;
        }
        
        function gerarCalendario() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoInput').value);
            const dias = gerarDiasArray(mes, ano);
            
            document.getElementById('mesAnoDisplay').innerHTML = `
                <h3>${nomesMeses[mes]} ${ano}</h3>
            `;
            
            let html = `
                <div class="dias-semana">
                    <div class="dia-semana">DOM</div>
                    <div class="dia-semana">SEG</div>
                    <div class="dia-semana">TER</div>
                    <div class="dia-semana">QUA</div>
                    <div class="dia-semana">QUI</div>
                    <div class="dia-semana">SEX</div>
                    <div class="dia-semana">SÁB</div>
                </div>
                <div class="dias-grid">
            `;
            
            dias.forEach(dia => {
                if (dia === null) {
                    html += `<div class="dia-card vazio"></div>`;
                } else {
                    const noturnoFunc = plantoes[`${dia.numero}-noturno`] || '';
                    
                    let classeDia = 'dia-card';
                    if (dia.diaSemana === 0) classeDia += ' domingo';
                    if (dia.diaSemana === 6) classeDia += ' sabado';
                    
                    html += `
                        <div class="${classeDia}">
                            <div class="dia-numero">${dia.numero}</div>
                            
                            <div class="plantao-item noturno ${noturnoFunc ? 'selecionado' : ''}" 
                                 onclick="marcarPlantao(${dia.numero}, 'noturno')">
                                <div class="plantao-info">
                                    <span class="plantao-horario">🌙 17h-06:30</span>
                                    <span class="plantao-funcionario">${noturnoFunc}</span>
                                </div>
                            </div>
                    `;
                    
                    if (dia.diaSemana === 6) {
                        const extraFunc = plantoes[`${dia.numero}-sabado-extra`] || '';
                        html += `
                            <div class="plantao-item sabado-extra ${extraFunc ? 'selecionado' : ''}" 
                                 onclick="marcarPlantao(${dia.numero}, 'sabado-extra')">
                                <div class="plantao-info">
                                    <span class="plantao-horario">⏰ 12h-17h</span>
                                    <span class="plantao-funcionario">${extraFunc}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    if (dia.diaSemana === 0) {
                        const diurnoFunc = plantoes[`${dia.numero}-domingo-diurno`] || '';
                        html += `
                            <div class="plantao-item domingo-diurno ${diurnoFunc ? 'selecionado' : ''}" 
                                 onclick="marcarPlantao(${dia.numero}, 'domingo-diurno')">
                                <div class="plantao-info">
                                    <span class="plantao-horario">☀️ 06:30-17h</span>
                                    <span class="plantao-funcionario">${diurnoFunc}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                }
            });
            
            html += `</div>`;
            document.getElementById('calendarioContainer').innerHTML = html;
            calcularDivisao();
        }
        
        function calcularDivisao() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoInput').value);
            const dias = gerarDiasArray(mes, ano).filter(d => d !== null);
            
            const HORAS_NOTURNO = 13.5;
            const HORAS_SABADO_EXTRA = 5;
            const HORAS_DOMINGO_DIURNO = 10.5;
            
            // Total de horas no mês
            let totalHorasMes = 0;
            dias.forEach(dia => {
                totalHorasMes += HORAS_NOTURNO;
                if (dia.diaSemana === 6) totalHorasMes += HORAS_SABADO_EXTRA;
                if (dia.diaSemana === 0) totalHorasMes += HORAS_DOMINGO_DIURNO;
            });
            
            const valorHora = totalHorasMes > 0 ? SALARIO_MENSAL / totalHorasMes : 0;
            
            // Horas por funcionário
            let horasPorFuncionario = {};
            let totalHorasTrabalhadas = 0;
            
            dias.forEach(dia => {
                const noturnoFunc = plantoes[`${dia.numero}-noturno`];
                if (noturnoFunc) {
                    horasPorFuncionario[noturnoFunc] = (horasPorFuncionario[noturnoFunc] || 0) + HORAS_NOTURNO;
                    totalHorasTrabalhadas += HORAS_NOTURNO;
                }
                
                if (dia.diaSemana === 6) {
                    const extraFunc = plantoes[`${dia.numero}-sabado-extra`];
                    if (extraFunc) {
                        horasPorFuncionario[extraFunc] = (horasPorFuncionario[extraFunc] || 0) + HORAS_SABADO_EXTRA;
                        totalHorasTrabalhadas += HORAS_SABADO_EXTRA;
                    }
                }
                
                if (dia.diaSemana === 0) {
                    const diurnoFunc = plantoes[`${dia.numero}-domingo-diurno`];
                    if (diurnoFunc) {
                        horasPorFuncionario[diurnoFunc] = (horasPorFuncionario[diurnoFunc] || 0) + HORAS_DOMINGO_DIURNO;
                        totalHorasTrabalhadas += HORAS_DOMINGO_DIURNO;
                    }
                }
            });
            
            let resultadoHtml = '';
            
            if (Object.keys(horasPorFuncionario).length === 0) {
                resultadoHtml = `
                    <div class="sem-dados">
                        Clique nos plantões para marcar quem trabalhou
                    </div>
                `;
            } else {
                const funcionarios = Object.keys(horasPorFuncionario).sort((a, b) => horasPorFuncionario[b] - horasPorFuncionario[a]);
                
                resultadoHtml = `
                    <table class="resultado-tabela" id="tabelaResultado">
                        <thead>
                            <tr>
                                <th>Guarda</th>
                                <th>Horas</th>
                                <th>%</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                funcionarios.forEach(func => {
                    const horas = horasPorFuncionario[func];
                    const percentual = ((horas / totalHorasTrabalhadas) * 100).toFixed(1);
                    const valor = horas * valorHora;
                    
                    resultadoHtml += `
                        <tr>
                            <td><strong>${func}</strong></td>
                            <td>${horas.toFixed(1)}h</td>
                            <td>${percentual}%</td>
                            <td class="valor-destaque">${formatarMoeda(valor)}</td>
                        </tr>
                    `;
                });
                
                resultadoHtml += `
                        <tr class="total-row">
                            <td><strong>TOTAL</strong></td>
                            <td><strong>${totalHorasTrabalhadas.toFixed(1)}h</strong></td>
                            <td><strong>100%</strong></td>
                            <td class="valor-destaque"><strong>${formatarMoeda(SALARIO_MENSAL)}</strong></td>
                        </tr>
                    </tbody>
                </table>
                `;
            }
            
            document.getElementById('resultadoContainer').innerHTML = resultadoHtml;
        }
        
        function formatarMoeda(valor) {
            return 'R$ ' + valor.toFixed(2).replace('.', ',');
        }
        
        function gerarPDF() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const ano = parseInt(document.getElementById('anoInput').value);
            const dias = gerarDiasArray(mes, ano).filter(d => d !== null);
            
            const HORAS_NOTURNO = 13.5;
            const HORAS_SABADO_EXTRA = 5;
            const HORAS_DOMINGO_DIURNO = 10.5;
            
            // Calcular totais
            let totalHorasMes = 0;
            dias.forEach(dia => {
                totalHorasMes += HORAS_NOTURNO;
                if (dia.diaSemana === 6) totalHorasMes += HORAS_SABADO_EXTRA;
                if (dia.diaSemana === 0) totalHorasMes += HORAS_DOMINGO_DIURNO;
            });
            
            const valorHora = totalHorasMes > 0 ? SALARIO_MENSAL / totalHorasMes : 0;
            
            // Horas por funcionário
            let horasPorFuncionario = {};
            let totalHorasTrabalhadas = 0;
            let plantoesDetalhados = [];
            
            dias.forEach(dia => {
                const noturnoFunc = plantoes[`${dia.numero}-noturno`];
                if (noturnoFunc) {
                    horasPorFuncionario[noturnoFunc] = (horasPorFuncionario[noturnoFunc] || 0) + HORAS_NOTURNO;
                    totalHorasTrabalhadas += HORAS_NOTURNO;
                    plantoesDetalhados.push({
                        dia: dia.numero,
                        tipo: 'Noturno',
                        funcionario: noturnoFunc,
                        horas: HORAS_NOTURNO
                    });
                }
                
                if (dia.diaSemana === 6) {
                    const extraFunc = plantoes[`${dia.numero}-sabado-extra`];
                    if (extraFunc) {
                        horasPorFuncionario[extraFunc] = (horasPorFuncionario[extraFunc] || 0) + HORAS_SABADO_EXTRA;
                        totalHorasTrabalhadas += HORAS_SABADO_EXTRA;
                        plantoesDetalhados.push({
                            dia: dia.numero,
                            tipo: 'Sábado Extra',
                            funcionario: extraFunc,
                            horas: HORAS_SABADO_EXTRA
                        });
                    }
                }
                
                if (dia.diaSemana === 0) {
                    const diurnoFunc = plantoes[`${dia.numero}-domingo-diurno`];
                    if (diurnoFunc) {
                        horasPorFuncionario[diurnoFunc] = (horasPorFuncionario[diurnoFunc] || 0) + HORAS_DOMINGO_DIURNO;
                        totalHorasTrabalhadas += HORAS_DOMINGO_DIURNO;
                        plantoesDetalhados.push({
                            dia: dia.numero,
                            tipo: 'Domingo Diurno',
                            funcionario: diurnoFunc,
                            horas: HORAS_DOMINGO_DIURNO
                        });
                    }
                }
            });
            
            // Criar PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Título
            doc.setFontSize(18);
            doc.setTextColor(74, 20, 140);
            doc.text('Relatório de Plantões', 14, 20);
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`${nomesMeses[mes]} ${ano}`, 14, 30);
            doc.text(`Salário Total: R$ 4.500,00`, 14, 38);
            doc.text(`Valor da Hora: ${formatarMoeda(valorHora)}`, 14, 46);
            doc.text(`Total de Horas no Mês: ${totalHorasMes.toFixed(1)}h`, 14, 54);
            
            // Tabela de resumo por guarda
            doc.setFontSize(14);
            doc.setTextColor(74, 20, 140);
            doc.text('Resumo por Guarda', 14, 68);
            
            const dadosResumo = [];
            const funcionarios = Object.keys(horasPorFuncionario).sort((a, b) => horasPorFuncionario[b] - horasPorFuncionario[a]);
            
            funcionarios.forEach(func => {
                const horas = horasPorFuncionario[func];
                const percentual = ((horas / totalHorasTrabalhadas) * 100).toFixed(1);
                const valor = horas * valorHora;
                dadosResumo.push([func, horas.toFixed(1) + 'h', percentual + '%', 'R$ ' + valor.toFixed(2)]);
            });
            
            dadosResumo.push(['TOTAL', totalHorasTrabalhadas.toFixed(1) + 'h', '100%', 'R$ 4.500,00']);
            
            doc.autoTable({
                startY: 72,
                head: [['Guarda', 'Horas', '%', 'Valor']],
                body: dadosResumo,
                theme: 'grid',
                headStyles: { fillColor: [74, 20, 140] },
                styles: { fontSize: 10 }
            });
            
            // Detalhamento por dia
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(14);
            doc.setTextColor(74, 20, 140);
            doc.text('Detalhamento por Dia', 14, finalY);
            
            const dadosDetalhe = [];
            plantoesDetalhados.sort((a, b) => a.dia - b.dia).forEach(p => {
                dadosDetalhe.push([`Dia ${p.dia}`, p.tipo, p.funcionario, p.horas.toFixed(1) + 'h']);
            });
            
            doc.autoTable({
                startY: finalY + 4,
                head: [['Dia', 'Tipo', 'Guarda', 'Horas']],
                body: dadosDetalhe,
                theme: 'grid',
                headStyles: { fillColor: [74, 20, 140] },
                styles: { fontSize: 9 }
            });
            
            // Data de geração
            const dataAtual = new Date();
            doc.setFontSize(8);
            doc.setTextColor(128, 128, 128);
            doc.text(`Relatório gerado em: ${dataAtual.toLocaleDateString()} ${dataAtual.toLocaleTimeString()}`, 14, doc.internal.pageSize.height - 10);
            
            // Salvar PDF
            doc.save(`plantões_${nomesMeses[mes]}_${ano}.pdf`);
        }
        
        window.onload = function() {
            const hoje = new Date();
            document.getElementById('mesSelect').value = hoje.getMonth();
            document.getElementById('anoInput').value = hoje.getFullYear();
            gerarCalendario();
        };
    </script>
</body>
</html>
